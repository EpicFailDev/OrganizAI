name: mobile
description: "OrganizAI mobile app developed in Flutter for family financial control."
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase Integration
  supabase_flutter: ^2.6.0

  # State Management
  flutter_riverpod: ^2.6.1

  # Icons & UI elements
  cupertino_icons: ^1.0.6

  # Charts
  fl_chart: ^0.66.0

  # Image selection for receipts
  image_picker: ^1.0.7

  # OCR - Google ML Kit (gratuito, offline)
  google_mlkit_text_recognition: ^0.14.0

  # Formats
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/wallet_icon.png

  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Regular.ttf
          weight: 400
        - asset: assets/fonts/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Variable.ttf
          weight: 100
        - asset: assets/fonts/Inter-Variable.ttf
          weight: 200
        - asset: assets/fonts/Inter-Variable.ttf
          weight: 300
        - asset: assets/fonts/Inter-Variable.ttf
          weight: 400
        - asset: assets/fonts/Inter-Variable.ttf
          weight: 500
        - asset: assets/fonts/Inter-Variable.ttf
          weight: 600
        - asset: assets/fonts/Inter-Variable.ttf
          weight: 700
        - asset: assets/fonts/Inter-Variable.ttf
          weight: 800
        - asset: assets/fonts/Inter-Variable.ttf
          weight: 900
